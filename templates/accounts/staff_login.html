<!-- templates/accounts/staff_login.html -->
{% extends "base.html" %}
{% block title %}Staff Login{% endblock %}

{% block content %}
<style>
  body {
    background: linear-gradient(135deg, #4f46e5, #06b6d4);
  }

  .login-wrapper {
    min-height: 85vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .login-card {
    background: #ffffff;
    border-radius: 16px;
    padding: 2.5rem;
    max-width: 420px;
    width: 100%;
    box-shadow: 0 20px 40px rgba(0,0,0,0.15);
    animation: fadeIn 0.6s ease;
  }

  .login-card h2 {
    font-weight: 700;
    text-align: center;
    margin-bottom: 0.5rem;
  }

  .login-subtitle {
    text-align: center;
    font-size: 0.9rem;
    color: #6b7280;
    margin-bottom: 1.5rem;
  }

  .form-control {
    border-radius: 10px;
    padding: 0.65rem 0.75rem;
  }

  .btn-login {
    width: 100%;
    border-radius: 10px;
    padding: 0.6rem;
    font-weight: 600;
    letter-spacing: 0.5px;
  }

  .role-badge {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-bottom: 1rem;
  }

  .role-badge span {
    background: #eef2ff;
    color: #3730a3;
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 0.75rem;
    font-weight: 600;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>

<div class="login-wrapper">
  <div class="login-card">

    <h2>Staff Login</h2>
    <div class="login-subtitle">
      Secure access for hospital staff
    </div>

    <div class="role-badge">
      <span>Doctor</span>
      <span>Lab Technician</span>
    </div>

    <form id="staff-login-form">
      <div class="mb-3">
        <label class="form-label fw-semibold">Username</label>
        <input type="text" id="username" class="form-control" placeholder="Enter username" required>
      </div>

      <div class="mb-4">
        <label class="form-label fw-semibold">Password</label>
        <input type="password" id="password" class="form-control" placeholder="Enter password" required>
      </div>

      <button class="btn btn-primary btn-login" type="submit">
        Login
      </button>
    </form>

  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
document.getElementById('staff-login-form').addEventListener('submit', async (e)=>{
  e.preventDefault();

  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;

  if (!username || !password) {
    showAlert('Username and password are required', 'warning');
    return;
  }

  try {
    const res = await fetch('/api/accounts/staff/login/', {
      method: 'POST',
      headers: {
        'Content-Type':'application/json',
        'X-CSRFToken': getCSRFToken()
      },
      body: JSON.stringify({ username, password })
    });

    const data = await res.json();

    if (!res.ok) {
      showAlert(data.detail || 'Login failed', 'danger');
      return;
    }

    localStorage.setItem('access_token', data.access);
    localStorage.setItem('refresh_token', data.refresh);
    localStorage.setItem('user_role', data.role || 'staff');

    showAlert('Login successful', 'success');

    let redirectUrl = '/accounts/staff-dashboard/';

    if (data.role === 'doctor') {
      redirectUrl = '/accounts/doctor-dashboard/';
    } else if (data.role === 'lab_technician') {
      redirectUrl = '/accounts/lab-assistant-dashboard/';
    } else if (data.role === 'admin') {
      redirectUrl = '/admin/';
    }

    setTimeout(() => window.location.href = redirectUrl, 1000);

  } catch(err){
    showAlert('Server error', 'danger');
  }
});
</script>
{% endblock %}
