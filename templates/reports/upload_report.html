<!-- templates/reports/upload_report.html -->
{% extends "base.html" %}
{% block title %}Upload Report{% endblock %}

{% block content %}
<h2>Upload Report (Lab Technician)</h2>
<form id="upload-form">
  <div class="mb-3">
    <label class="form-label">Patient ID</label>
    <input id="patient" class="form-control" required placeholder="patient id (user id)"/>
  </div>
  <div class="mb-3">
    <label class="form-label">Test Name</label>
    <input id="test_name" class="form-control" required />
  </div>
  <div class="mb-3">
    <label class="form-label">Report File (PDF)</label>
    <input type="file" id="file" class="form-control" />
  </div>
  <button class="btn btn-primary">Upload</button>
</form>
{% endblock %}

{% block scripts %}
<script>
document.getElementById('upload-form').addEventListener('submit', async e=>{
  e.preventDefault();
  const token = getAccessToken();
  if(!token){ showAlert('Not logged in','warning'); return; }
  
  const patient = document.getElementById('patient').value.trim();
  const test_name = document.getElementById('test_name').value.trim();
  
  if(!patient || !test_name) {
    showAlert('Patient ID and Test Name are required','warning');
    return;
  }
  
  const fd = new FormData();
  fd.append('patient', patient);
  fd.append('test_name', test_name);
  const fileEl = document.getElementById('file');
  if(fileEl.files.length) fd.append('file', fileEl.files[0]);
  
  try {
    const res = await fetch('/api/reports/upload/', {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + token, 'X-CSRFToken': getCSRFToken() },
      body: fd
    });
    const data = await res.json();
    if(!res.ok) { showAlert(data.detail || JSON.stringify(data),'danger'); return; }
    showAlert('Report uploaded successfully (pending approval).','success');
    document.getElementById('upload-form').reset();
  } catch(err){ showAlert(err.message,'danger'); }
});
</script>
{% endblock %}
